            <h1>Curso de Html</h1>
            <p>HTML (HyperText Markup Language) é a linguagem padrão de marcação para criar a estrutura e o conteúdo de páginas web, utilizando tags como <br>
                h1, p, e img para organizar elementos. Não é uma linguagem de programação, <br>
                mas sim o "esqueleto" de um site, interpretado por navegadores.</p>
            <button onclick="abrirForm('forms')" id="btnForms">Aprender</button>
        </div>

            </form>
        </div>

        </div>

        </div>
